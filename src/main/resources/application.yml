spring:
  application:
    name: iMessage Server
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 1GB
      max-request-size: 1GB
  mvc:
    async:
      request-timeout: 60000
  mail:
    protocol: smtp
  lifecycle:
    timeout-per-shutdown-phase: 120s
server:
  shutdown: graceful
  servlet:
    session:
      cookie:
        max-age: 2592000
    encoding:
      enabled: true
      charset: UTF-8
      force: true
  tomcat:
    threads:
      max: 1000
      min-spare: 50
    accept-count: 1000
    max-connections: 10000
mybatis:
  configuration:
    map-underscore-to-camel-case: true
apollo:
  lowest-allow-client-version: 1
  current-client-version: 1

